name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" --channel=0 > /dev/null 2>&1 || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create keystore
        run: |
          keytool -genkey -v -keystore $HOME/release.keystore -alias labcompanion -keyalg RSA -keysize 4096 -validity 10000 \
            -dname "CN=LabCompanion, OU=Dev, O=LabCompanion, L=City, S=State, C=US" \
            -storepass android -keypass android

      - name: Initialize Bubblewrap project
        run: |
          mkdir -p twa-project
          cd twa-project
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.labcompanion.app",
            "host": "astralgenixx.github.io",
            "name": "Lab Companion",
            "launcherName": "Lab Companion",
            "display": "standalone",
            "themeColor": "#0d9488",
            "backgroundColor": "#0b1220",
            "startUrl": "/lab-companion/",
            "iconUrl": "https://astralgenixx.github.io/lab-companion/icons/icon-512.png",
            "maskableIconUrl": "https://astralgenixx.github.io/lab-companion/icons/icon-512.png",
            "shortcuts": [],
            "webManifestUrl": "https://astralgenixx.github.io/lab-companion/manifest.json",
            "fallbackType": "customtabs",
            "features": { "locationDelegation": { "enabled": true } },
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "orientation": "any",
            "fullScopeUrl": "https://astralgenixx.github.io/lab-companion/",
            "signingKey": {
                "path": "$HOME/release.keystore",
                "alias": "labcompanion",
                "password": "android",
                "keyPassword": "android"
            }
          }
          EOF
        env:
          HOME: /home/runner

      - name: Build APK with Bubblewrap
        run: |
          cd twa-project
          bubblewrap build
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.17-10/x64
          HOME: /home/runner
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab-companion-apk
          path: |
            twa-project/**/*.apk
            twa-project/**/*.aab
          if-no-files-found: warn
