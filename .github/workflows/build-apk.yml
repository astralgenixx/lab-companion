name: Build Android APK via Gradle

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export SDK=$HOME/android-sdk
          mkdir -p $SDK/cmdline-tools
          cd $SDK/cmdline-tools
          curl -sLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "$SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Create keystore
        run: |
          keytool -genkey -v -keystore $HOME/release.keystore -alias lb -keyalg RSA -keysize 4096 -validity 10000 \
            -dname "CN=LC, OU=Dev, O=LC, L=LC, S=LC, C=US" -storepass android -keypass android

      - name: Create TWA project
        run: |
          mkdir -p twa/app/src/main/java/com/labcompanion/app
          mkdir -p twa/app/src/main/res/values

          # settings.gradle
          echo 'rootProject.name="LabCompanion"; include ":app"' > twa/settings.gradle

          # root build.gradle
          cat > twa/build.gradle << 'GRADLE'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath "com.android.tools.build:gradle:8.2.2" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE

          # app/build.gradle
          cat > twa/app/build.gradle << 'GRADLE'
          plugins { id "com.android.application" }
          android {
            namespace "com.labcompanion.app"
            compileSdk 34
            defaultConfig {
              applicationId "com.labcompanion.app"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0"
            }
            buildTypes {
              release {
                minifyEnabled true
                proguardFiles getDefaultProguardFile("proguard-android-optimize.txt")
              }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
          }
          dependencies {
            implementation "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"
          }
          GRADLE

          # AndroidManifest.xml
          cat > twa/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
              android:allowBackup="true"
              android:icon="@mipmap/ic_launcher"
              android:label="Lab Companion"
              android:supportsRtl="true"
              android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://astralgenixx.github.io/lab-companion/" />
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                  android:resource="@color/colorPrimaryDark" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https"
                    android:host="astralgenixx.github.io"
                    android:pathPrefix="/lab-companion/"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          XML

          # Asset links (placeholder)
          mkdir -p twa/app/src/main/assets
          echo '[]' > twa/app/src/main/assets/assetlinks.json

          # colors.xml
          cat > twa/app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#0d9488</color>
            <color name="colorPrimaryDark">#0b1220</color>
          </resources>
          XML

          # Default launcher icon (simple placeholder)
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          cp $GITHUB_WORKSPACE/icons/icon-192.png twa/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp $GITHUB_WORKSPACE/icons/icon-512.png twa/app/src/main/res/mipmap-xxhdpi/ic_launcher.png

          # gradle.properties
          cat > twa/gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          PROPS

          # gradle wrapper
          cd twa
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5

      - name: Copy keystore to project
        run: cp $HOME/release.keystore twa/release.keystore

      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=lb \
            -Pandroid.injected.signing.key.password=android
        working-directory: twa

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lab-companion-apk
          path: twa/app/build/outputs/apk/release/*.apk
